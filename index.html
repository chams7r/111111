<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏃 Subway Runner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="hud" class="hidden">
        <div id="hud-score">🏆 0</div>
        <div id="hud-coins">🪙 0</div>
    </div>

    <div id="menu-screen" class="overlay">
        <div class="panel">
            <h1>🏃 Subway Runner</h1>
            <p>Уворачивайся от препятствий!<br>Собирай монеты!</p>
            <div class="controls-hint">
                <div>⬅️➡️ Смена полосы</div>
                <div>⬆️ Прыжок</div>
                <div>⬇️ Подкат</div>
            </div>
            <button id="btn-play" class="btn-primary">▶ Играть</button>
            <div id="menu-highscore" class="highscore"></div>
        </div>
    </div>

    <div id="gameover-screen" class="overlay hidden">
        <div class="panel">
            <h2>💀 Game Over</h2>
            <div id="go-score"></div>
            <div id="go-coins"></div>
            <div id="go-distance"></div>
            <div id="go-record" class="new-record hidden">🎉 Новый рекорд!</div>
            <button id="btn-retry" class="btn-primary">🔄 Ещё раз</button>
            <button id="btn-menu" class="btn-secondary">🏠 Меню</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
